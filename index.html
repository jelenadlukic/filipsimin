<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Jewelry Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
    canvas { width: 100%; height: 100%; display: block; }
    #loading-overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #fff;
      gap: 1rem; z-index: 100; transition: opacity 0.4s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .lil-gui { --width: 280px; z-index: 200; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #eee;
      border-top-color: #999; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p { font-size: 13px; color: #999; letter-spacing: 0.05em; text-transform: uppercase; }
  </style>
  <script type="module" crossorigin src="/assets/index-0kszqcZp.js"></script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p>Loading model...</p>
  </div>
</body>
</html>
